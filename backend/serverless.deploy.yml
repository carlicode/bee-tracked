# Config para deploy (sin serverless-offline que causa conflicto)
# Prod:  npx serverless deploy --stage prod --config serverless.deploy.yml
# Stage: npx serverless deploy --stage staging --config serverless.deploy.yml
service: bee-tracked-backend

params:
  prod:
    frontendUrl: 'https://d19ls0k7de9u6w.cloudfront.net'
    sheetsWriteEnabled: 'true'
    warmupEnabled: true
    nodeEnv: production
  staging:
    # Actualizar tras crear CloudFront de staging (ver docs/STAGING_ENVIRONMENT.md)
    frontendUrl: 'https://STAGING_CLOUDFRONT_URL.cloudfront.net'
    sheetsWriteEnabled: 'false'
    warmupEnabled: false
    nodeEnv: staging

custom:
  sessionsTableName: bee-tracked-sessions-${sls:stage}
  turnosTableName: bee-tracked-turnos-${sls:stage}
  carrerasTableName: bee-tracked-carreras-${sls:stage}
  kilometrajesTableName: bee-tracked-kilometrajes-${sls:stage}
  anunciosTableName: bee-tracked-anuncios-${sls:stage}
  lecturasTableName: bee-tracked-lecturas-${sls:stage}
  permisosTableName: bee-tracked-permisos-${sls:stage}
  usersTableName: bee-tracked-users-${sls:stage}
  auditTableName: bee-tracked-audit-${sls:stage}
  pushSubsTableName: bee-tracked-push-subs-${sls:stage}
  onboardingTableName: bee-tracked-onboarding-${sls:stage}
  calendariosTableName: bee-tracked-calendarios-${sls:stage}
  extraordinariosTableName: bee-tracked-extraordinarios-${sls:stage}
  multasTableName: bee-tracked-multas-${sls:stage}

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: ${opt:stage, 'prod'}
  timeout: 30
  memorySize: 512
  environment:
    NODE_ENV: ${param:nodeEnv}
    STAGE: ${sls:stage}
    FRONTEND_URL: ${param:frontendUrl}
    SHEETS_WRITE_ENABLED: ${param:sheetsWriteEnabled}
    SESSION_STORE: dynamodb
    SESSIONS_TABLE_NAME: ${self:custom.sessionsTableName}
    TURNOS_TABLE: ${self:custom.turnosTableName}
    CARRERAS_TABLE: ${self:custom.carrerasTableName}
    KILOMETRAJES_TABLE: ${self:custom.kilometrajesTableName}
    ANUNCIOS_TABLE: ${self:custom.anunciosTableName}
    LECTURAS_TABLE: ${self:custom.lecturasTableName}
    PERMISOS_TABLE: ${self:custom.permisosTableName}
    USERS_TABLE: ${self:custom.usersTableName}
    AUDIT_TABLE: ${self:custom.auditTableName}
    PUSH_SUBS_TABLE: ${self:custom.pushSubsTableName}
    ONBOARDING_TABLE: ${self:custom.onboardingTableName}
    CALENDARIOS_TABLE: ${self:custom.calendariosTableName}
    EXTRAORDINARIOS_TABLE: ${self:custom.extraordinariosTableName}
    MULTAS_TABLE: ${self:custom.multasTableName}
    VAPID_SUBJECT: 'mailto:admin@beezero.com'
    GOOGLE_SHEET_ID: '1L69tZzVSHlhuKGP9MCdcezOGPsYyjC2Mm-i03Hm5tM8'
    CARRERAS_BIKERS_SHEET_ID: '1OkM4FLSe0CsLo8w4o50xcVdzsUcHVzpaYRqhGBwJRcs'
    CARRERAS_DRIVERS_SHEET_ID: '1OkM4FLSe0CsLo8w4o50xcVdzsUcHVzpaYRqhGBwJRcs'
    REGISTROS_SHEET_ID: '1a8M19WHhfM2SWKSiWbTIpVU76gdAFCJ9uv7y0fnPA4g'
    AWS_S3_BUCKET: bee-tracked-photos
    AWS_REGION_CUSTOM: us-east-1
    COGNITO_USER_POOL_ID: us-east-1_REsVOVqcY
    COGNITO_REGION: us-east-1
    DYNAMO_WRITE_ENABLED: 'true'
    DYNAMO_READ_ENABLED: 'true'
    GMAIL_USER: '${ssm:/bee-tracked/GMAIL_USER}'
    GMAIL_APP_PASSWORD: '${ssm:/bee-tracked/GMAIL_APP_PASSWORD}'
    PERMISO_NOTIFY_EMAILS: '${ssm:/bee-tracked/PERMISO_NOTIFY_EMAILS}'
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - secretsmanager:GetSecretValue
          Resource:
            - arn:aws:secretsmanager:us-east-1:*:secret:bee-tracked/*
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:GetParameters
          Resource:
            - arn:aws:ssm:us-east-1:*:parameter/bee-tracked/*
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::bee-tracked-photos/*
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchWriteItem
          Resource:
            - !GetAtt SessionsTable.Arn
            - !GetAtt TurnosTable.Arn
            - Fn::Join: ['', [!GetAtt TurnosTable.Arn, '/index/*']]
            - !GetAtt CarrerasTable.Arn
            - Fn::Join: ['', [!GetAtt CarrerasTable.Arn, '/index/*']]
            - !GetAtt KilometrajesTable.Arn
            - !GetAtt AnunciosTable.Arn
            - Fn::Join: ['', [!GetAtt AnunciosTable.Arn, '/index/*']]
            - !GetAtt LecturasTable.Arn
            - !GetAtt PermisosTable.Arn
            - Fn::Join: ['', [!GetAtt PermisosTable.Arn, '/index/*']]
            - !GetAtt UsersTable.Arn
            - !GetAtt AuditTable.Arn
            - !GetAtt PushSubsTable.Arn
            - !GetAtt OnboardingTable.Arn
            - !GetAtt CalendariosTable.Arn
            - Fn::Join: ['', [!GetAtt CalendariosTable.Arn, '/index/*']]
            - !GetAtt ExtraordinariosTable.Arn
            - Fn::Join: ['', [!GetAtt ExtraordinariosTable.Arn, '/index/*']]
            - !GetAtt MultasTable.Arn
            - Fn::Join: ['', [!GetAtt MultasTable.Arn, '/index/*']]
        - Effect: Allow
          Action:
            - cognito-idp:ListUsers
            - cognito-idp:AdminListGroupsForUser
            - cognito-idp:AdminCreateUser
            - cognito-idp:AdminSetUserPassword
            - cognito-idp:AdminAddUserToGroup
            - cognito-idp:AdminRemoveUserFromGroup
            - cognito-idp:AdminUpdateUserAttributes
          Resource:
            - arn:aws:cognito-idp:us-east-1:*:userpool/us-east-1_REsVOVqcY

functions:
  api:
    handler: lambda.handler
    events:
      - schedule:
          rate: rate(5 minutes)
          enabled: ${param:warmupEnabled}
          description: 'Warmup ping para evitar cold starts en horario de turnos'
          input:
            warmup: true
      - http:
          path: /
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
              - X-Session-Id
              - X-User-Id
              - X-Request-Id
      - http:
          path: /{proxy+}
          method: ANY
          cors:
            origin: '*'
            headers:
              - Content-Type
              - X-Amz-Date
              - Authorization
              - X-Api-Key
              - X-Amz-Security-Token
              - X-Amz-User-Agent
              - X-Session-Id
              - X-User-Id
              - X-Request-Id

package:
  exclude:
    - node_modules/**
    - .git/**
    - .env
    - test/**
    - scripts/**
  include:
    - lambda.js
    - src/**
    - data/**
    - node_modules/**

resources:
  Resources:
    SessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.sessionsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    TurnosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.turnosTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: estado
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
          - AttributeName: tipo
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: estado-fecha-index
            KeySchema:
              - AttributeName: estado
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: tipo-fecha-index
            KeySchema:
              - AttributeName: tipo
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    CarrerasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.carrerasTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
          - AttributeName: carreraId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: fecha-index
            KeySchema:
              - AttributeName: fecha
                KeyType: HASH
              - AttributeName: carreraId
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    KilometrajesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.kilometrajesTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    AnunciosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.anunciosTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: N
          - AttributeName: status
            AttributeType: S
          - AttributeName: startDate
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: status-startDate-index
            KeySchema:
              - AttributeName: status
                KeyType: HASH
              - AttributeName: startDate
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    LecturasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.lecturasTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    PermisosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.permisosTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: estado
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: estado-fecha-index
            KeySchema:
              - AttributeName: estado
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: userId-fecha-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    UsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.usersTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE

    AuditTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.auditTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: entityId
            AttributeType: S
          - AttributeName: timestamp
            AttributeType: N
        KeySchema:
          - AttributeName: entityId
            KeyType: HASH
          - AttributeName: timestamp
            KeyType: RANGE

    PushSubsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.pushSubsTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: ttl
          Enabled: true

    OnboardingTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.onboardingTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH

    CalendariosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.calendariosTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: semana
            AttributeType: S
          - AttributeName: estado
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: semana-index
            KeySchema:
              - AttributeName: semana
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: estado-index
            KeySchema:
              - AttributeName: estado
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    ExtraordinariosTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.extraordinariosTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: estado
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
          - AttributeName: userId
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: estado-fecha-index
            KeySchema:
              - AttributeName: estado
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: userId-index
            KeySchema:
              - AttributeName: userId
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL

    MultasTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:custom.multasTableName}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: entityScope
            AttributeType: S
          - AttributeName: fecha
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        GlobalSecondaryIndexes:
          - IndexName: fecha-index
            KeySchema:
              - AttributeName: entityScope
                KeyType: HASH
              - AttributeName: fecha
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
