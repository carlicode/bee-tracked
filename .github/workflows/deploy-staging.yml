# Despliega a entorno STAGING (no toca producción en CloudFront prod)
# Rama: staging → URL de staging + API Gateway /staging + DynamoDB *-staging
name: Deploy Staging to AWS

on:
  push:
    branches: [staging]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  # Configurar en GitHub → Settings → Variables (ver docs/STAGING_ENVIRONMENT.md)
  S3_BUCKET: ${{ vars.STAGING_S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.STAGING_CLOUDFRONT_DISTRIBUTION_ID }}
  STAGING_API_URL: https://bxa273i618.execute-api.us-east-1.amazonaws.com/staging

jobs:
  deploy-backend-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Backend (Lambda staging)
        working-directory: backend
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          npm ci
          if [ -n "$STAGING_FRONTEND_URL" ]; then
            npx serverless deploy --stage staging --config serverless.deploy.yml --force \
              --param="frontendUrl=${STAGING_FRONTEND_URL}"
          else
            npx serverless deploy --stage staging --config serverless.deploy.yml --force
          fi

  deploy-frontend-staging:
    needs: deploy-backend-staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Validate staging config
        run: |
          if [ -z "${{ vars.STAGING_S3_BUCKET }}" ]; then
            echo "::error::Falta variable STAGING_S3_BUCKET en GitHub Actions"
            exit 1
          fi

      - name: Create .env.production (staging)
        working-directory: frontend
        run: |
          echo "VITE_API_URL=${{ env.STAGING_API_URL }}" > .env.production
          echo "VITE_APP_ENV=staging" >> .env.production
          echo "VITE_COGNITO_USER_POOL_ID=${{ vars.VITE_COGNITO_USER_POOL_ID }}" >> .env.production
          echo "VITE_COGNITO_CLIENT_ID=${{ vars.VITE_COGNITO_CLIENT_ID }}" >> .env.production

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (staging bucket)
        run: |
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --exclude "manifest.json" \
            --exclude "sw.js" \
            --exclude "*.css" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"
          aws s3 sync frontend/dist/ s3://${{ env.S3_BUCKET }}/ \
            --exclude "*" \
            --include "*.css" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css"
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"
          aws s3 cp frontend/dist/manifest.json s3://${{ env.S3_BUCKET }}/manifest.json \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/json"
          aws s3 cp frontend/dist/sw.js s3://${{ env.S3_BUCKET }}/sw.js \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "application/javascript"

      - name: Invalidate CloudFront (staging)
        if: ${{ vars.STAGING_CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
