<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Registro de carreras para drivers" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="/manifest.json" />
    <title>📍 BeeTracked</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="cache-error" style="display:none; padding:2rem; text-align:center; font-family:system-ui,sans-serif; max-width:400px; margin:2rem auto;">
      <h2 style="color:#1e40af;">Actualización disponible</h2>
      <p>Para ver la última versión, actualiza la página con:</p>
      <p><strong>Ctrl + Shift + R</strong> (Windows) o <strong>Cmd + Shift + R</strong> (Mac)</p>
      <p style="margin-top:1.5rem;"><a href="" style="color:#2563eb; font-weight:600;">Recargar ahora</a></p>
    </div>
    <script>
      // Si falla la carga del script (MIME type, caché antigua) o la app no carga, mostrar mensaje
      function showCacheError() {
        var root = document.getElementById('root');
        var box = document.getElementById('cache-error');
        if (root && box && !root.querySelector('*')) {
          root.style.display = 'none';
          box.style.display = 'block';
          var link = box.querySelector('a');
          if (link) {
            link.href = location.href;
            link.onclick = function() { location.reload(true); return false; };
          }
        }
      }
      window.addEventListener('error', function(e) {
        if ((e.message && String(e.message).includes('MIME type')) || (e.target && e.target.tagName === 'SCRIPT')) {
          showCacheError();
        }
      }, true);
      setTimeout(showCacheError, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
  </body>
</html>
